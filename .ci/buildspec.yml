version: 0.2

# Env vars ENV, REGION, PROJECT, ECR_REPO_URL, CONTAINER_NAME are injected
# by the probet `modules/pipeline` CodeBuild project — do not redeclare.
# The ECR repo is provisioned by tofu (modules/ecr); this buildspec never
# creates it.

phases:
  install:
    commands:
      - ACCOUNT_ID=$(aws sts get-caller-identity --query 'Account' --output text)
      - COMMIT_SHA=$(echo "$CODEBUILD_RESOLVED_SOURCE_VERSION" | cut -c 1-7)
      - echo "Building $CONTAINER_NAME for env=$ENV commit=$COMMIT_SHA"
      - echo "Pushing to $ECR_REPO_URL"

  pre_build:
    commands:
      - aws ecr get-login-password --region "$REGION" | docker login --username AWS --password-stdin "$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com"

  build:
    commands:
      - echo "Build started on $(date)"
      - docker build -t "$ECR_REPO_URL:latest" -t "$ECR_REPO_URL:$COMMIT_SHA" .
      - echo "Build completed on $(date)"

  post_build:
    commands:
      - echo "Pushing $ECR_REPO_URL:latest and :$COMMIT_SHA"
      - docker push "$ECR_REPO_URL:latest"
      - docker push "$ECR_REPO_URL:$COMMIT_SHA"
      - printf '[{"name":"%s","imageUri":"%s"}]' "$CONTAINER_NAME" "$ECR_REPO_URL:$COMMIT_SHA" > imagedefinitions.json
      - cat imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json

cache:
  paths:
    - '/root/.docker/**/*'
