version: 0.2

env:
  variables:
    REGION: "eu-west-2"
    CONTAINER_NAME: "betbuilder"

phases:
  install:
    commands:
      - ACCOUNT_ID=$(aws sts get-caller-identity --query 'Account' --output text)
      - COMMIT_SHA=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - REPO_NAME="$ENV-betbuilder"
      - IMAGE_URI=$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$REPO_NAME

  pre_build:
    commands:
      - |
        REPO_EXISTS=$(aws ecr describe-repositories --region "$REGION" --repository-names "$REPO_NAME" > /dev/null 2>&1; echo $?)
        if [ $REPO_EXISTS -ne 0 ]; then
          echo "Repository $REPO_NAME does not exist. Creating..."
          aws ecr create-repository --repository-name "$REPO_NAME" --region "$REGION"
        else
          echo "Repository $REPO_NAME already exists."
        fi
      - aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com

  build:
    commands:
      - echo "Build started on $(date)"
      - docker build -t $IMAGE_URI:latest -t $IMAGE_URI:$COMMIT_SHA .
      - echo "Build completed on $(date)"

  post_build:
    commands:
      - docker push $IMAGE_URI:latest
      - docker push $IMAGE_URI:$COMMIT_SHA
      - printf '[{"name":"%s","imageUri":"%s"}]' "$CONTAINER_NAME" "$IMAGE_URI:latest" > imagedef.json
      - cat imagedef.json

artifacts:
  files:
    - imagedef.json

cache:
  paths:
    - '/root/.docker/**/*'
