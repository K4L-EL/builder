<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo - Fight Cards</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@700&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-2: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #00dc82;
    --red: #f85149;
    --blue: #58a6ff;
    --yellow: #f0c000;
    --purple: #bd93f9;
    --pink: #ff79c6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Themed scrollbars - bingo uses a green->purple accent on hover */
  html { scrollbar-width: thin; scrollbar-color: #484f58 transparent; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track {
    background: var(--surface);
    border-left: 1px solid var(--border);
  }
  ::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #484f58, var(--border));
    border: 2px solid var(--surface);
    border-radius: 10px;
    min-height: 40px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, var(--accent), var(--purple));
  }
  ::-webkit-scrollbar-thumb:active { background: var(--accent); }
  ::-webkit-scrollbar-corner { background: var(--surface); }

  .app { max-width: 480px; margin: 0 auto; padding: 14px; }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 12px;
  }
  .title {
    font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .streak {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; padding: 4px 10px; border-radius: 16px;
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text-dim);
  }
  .streak strong { color: var(--accent); font-family: 'Space Mono', monospace; }

  .conn {
    font-size: 9px; color: var(--text-dim);
    padding: 3px 8px; border-radius: 14px;
    background: var(--surface-2); border: 1px solid var(--border);
    margin-left: 6px;
  }
  .conn .dot {
    display: inline-block; width: 5px; height: 5px; border-radius: 50%;
    background: var(--text-dim); margin-right: 5px; vertical-align: middle;
  }
  .conn.live .dot { background: var(--accent); animation: pulse 1.6s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .toolbar {
    display: flex; gap: 8px; margin-bottom: 12px; font-size: 11px;
  }
  .toolbar button {
    flex: 1; padding: 8px; border-radius: 10px; font-family: inherit; font-weight: 600;
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
    cursor: pointer; transition: all 0.2s;
  }
  .toolbar button:hover { border-color: var(--accent); color: var(--accent); }
  .toolbar button:disabled { opacity: 0.5; cursor: not-allowed; }

  .cards-wrap {
    display: flex; flex-direction: column; gap: 14px;
  }

  .card {
    position: relative;
    border-radius: 16px; padding: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: transform 0.25s cubic-bezier(.22,.61,.36,1), box-shadow 0.3s;
  }
  .card::before {
    content: '';
    position: absolute; inset: -1px;
    border-radius: 16px;
    padding: 1px;
    background: linear-gradient(135deg, transparent, var(--glow, var(--accent)), transparent);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    opacity: 0.6; pointer-events: none;
  }
  .card.safe     { --glow: var(--accent); }
  .card.banger   { --glow: var(--yellow); }
  .card.longshot { --glow: var(--purple); }
  .card.jackpot  { --glow: var(--pink); animation: shimmer 4s infinite; }
  @keyframes shimmer {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,121,198,0); }
    50%     { box-shadow: 0 0 30px 0 rgba(255,121,198,0.25); }
  }
  .card:hover { transform: translateY(-2px); }

  .card-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .theme {
    font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 1.5px;
    font-weight: 700; padding: 4px 10px; border-radius: 6px;
    background: var(--surface-2); border: 1px solid var(--border); color: var(--glow);
  }
  .odds {
    font-family: 'Space Mono', monospace; font-size: 26px; font-weight: 700;
    color: var(--glow); text-shadow: 0 0 16px var(--glow);
  }
  .odds small { font-size: 11px; color: var(--text-dim); text-shadow: none; }

  .bingo-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 12px;
  }
  .bingo-cell {
    aspect-ratio: 1;
    background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 8.5px; text-align: center; padding: 4px; line-height: 1.15;
    color: var(--text-dim); font-weight: 500; position: relative;
    transition: all 0.4s cubic-bezier(.22,.61,.36,1);
  }
  .bingo-cell.leg {
    background: linear-gradient(145deg, var(--surface-2), var(--surface));
    border-color: var(--glow); color: var(--text); font-weight: 600;
    box-shadow: inset 0 0 0 1px var(--glow);
  }
  .bingo-cell.free {
    background: var(--glow); color: var(--bg); font-weight: 700;
    font-family: 'Space Mono', monospace; letter-spacing: 0.5px;
  }
  .bingo-cell.won {
    background: rgba(0,220,130,0.25); border-color: var(--accent); color: var(--accent);
    animation: bounce 0.5s ease;
  }
  .bingo-cell.won::after {
    content: ''; position: absolute; inset: 0; border-radius: 8px;
    background: radial-gradient(circle, rgba(0,220,130,0.4), transparent 70%);
    pointer-events: none;
  }
  @keyframes bounce {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.18); }
    100% { transform: scale(1); }
  }
  .bingo-cell.lost {
    background: rgba(248,81,73,0.15); border-color: var(--red); color: var(--red);
    animation: shake 0.4s;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%     { transform: translateX(-4px); }
    75%     { transform: translateX(4px); }
  }
  .bingo-cell .mark {
    position: absolute; font-size: 22px; font-weight: 700; line-height: 1;
    font-family: 'Space Mono', monospace;
    opacity: 0; transform: scale(0); transition: all 0.3s cubic-bezier(.68,-0.55,.27,1.55);
  }
  .bingo-cell.won .mark  { opacity: 1; transform: scale(1); color: var(--accent); }
  .bingo-cell.lost .mark { opacity: 1; transform: scale(1); color: var(--red); }

  .stake-row {
    display: flex; align-items: center; gap: 6px; margin-bottom: 10px; flex-wrap: wrap;
  }
  .stake-chip {
    padding: 6px 12px; border-radius: 14px; font-size: 11px; font-family: inherit;
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
    cursor: pointer; font-weight: 600;
  }
  .stake-chip.active { background: var(--glow); color: var(--bg); border-color: var(--glow); }
  .stake-input {
    flex: 1; min-width: 70px; padding: 6px 10px; border-radius: 14px; font-size: 11px;
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
    font-family: 'Space Mono', monospace; text-align: center;
  }

  .tap-cta {
    width: 100%; padding: 12px; border-radius: 12px; border: none; cursor: pointer;
    font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; letter-spacing: 1.5px;
    background: linear-gradient(135deg, var(--glow), rgba(255,255,255,0.05));
    color: var(--bg); text-shadow: 0 1px 0 rgba(255,255,255,0.2);
    transition: transform 0.15s, box-shadow 0.2s;
  }
  .tap-cta:hover { transform: translateY(-1px); box-shadow: 0 8px 20px -8px var(--glow); }
  .tap-cta:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .tap-cta.live {
    background: var(--surface-2); color: var(--glow); border: 1px solid var(--glow);
    text-shadow: none;
  }

  .payout-hint {
    font-size: 10px; color: var(--text-dim); margin-top: 6px; text-align: center;
    font-family: 'Space Mono', monospace;
  }
  .payout-hint strong { color: var(--glow); }

  .card.near-miss { animation: pulseNear 1s 2; }
  @keyframes pulseNear {
    0%,100% { box-shadow: 0 0 0 0 transparent; }
    50%     { box-shadow: 0 0 24px 0 rgba(240,192,0,0.45); }
  }
  .card.winning { animation: winFlash 0.7s 3; }
  @keyframes winFlash {
    0%,100% { box-shadow: 0 0 0 0 transparent; }
    50%     { box-shadow: 0 0 40px 4px var(--glow); }
  }

  .empty {
    text-align: center; color: var(--text-dim); font-size: 12px; padding: 30px 10px;
  }

  #confetti-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 1000;
  }

  .toast {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--glow, var(--accent));
    padding: 10px 16px; border-radius: 12px; font-size: 12px;
    box-shadow: 0 10px 30px -10px rgba(0,0,0,0.6);
    z-index: 1100;
    animation: toastIn 0.3s ease;
  }
  @keyframes toastIn { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="title" id="title">BINGO</div>
    <div style="display:flex; align-items:center;">
      <span class="streak" id="streak-label">Streak: <strong id="streak">0</strong></span>
      <span class="conn" id="conn"><span class="dot"></span><span id="conn-label">...</span></span>
    </div>
  </div>

  <div class="toolbar">
    <button id="refresh-btn">NEW DECK</button>
    <button id="mute-btn">SOUND: OFF</button>
  </div>

  <div class="cards-wrap" id="cards"></div>
  <div class="empty" id="empty">Dealing cards...</div>
</div>

<canvas id="confetti-layer"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>
<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const fightId = params.get('fightId') || params.get('eventId') || 'default';
  const userId = params.get('userId') || 'demo_user';
  const API = window.location.origin;

  const cardsEl = document.getElementById('cards');
  const emptyEl = document.getElementById('empty');
  const streakEl = document.getElementById('streak');
  const connEl = document.getElementById('conn');
  const connLabel = document.getElementById('conn-label');
  const refreshBtn = document.getElementById('refresh-btn');
  const muteBtn = document.getElementById('mute-btn');

  let muted = true;
  muteBtn.addEventListener('click', () => {
    muted = !muted; muteBtn.textContent = 'SOUND: ' + (muted ? 'OFF' : 'ON');
  });

  const state = {
    cards: new Map(),
    legStatus: new Map(),
    streak: 0,
    activeTickets: new Map()
  };

  function setConn(which) {
    connEl.classList.remove('live', 'down');
    if (which === 'live') { connEl.classList.add('live'); connLabel.textContent = 'live'; }
    else if (which === 'down') { connEl.classList.add('down'); connLabel.textContent = 'reconnecting'; }
    else { connLabel.textContent = 'connecting'; }
  }

  function themeClass(theme) {
    const t = (theme || '').toLowerCase();
    if (t.includes('safe')) return 'safe';
    if (t.includes('banger')) return 'banger';
    if (t.includes('longshot')) return 'longshot';
    if (t.includes('jackpot')) return 'jackpot';
    return 'safe';
  }

  function legDisplayFor(leg, labels, idx) {
    if (labels && labels[idx]) return labels[idx];
    let s = leg.startsWith('bb_') ? leg.slice(3) : leg;
    return s.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  function renderGrid(card, legStatus) {
    const grid = [];
    const cellIndexes = pickCellIndexes(card.legs.length);
    for (let i = 0; i < 25; i++) grid.push({ kind: 'filler' });
    grid[12] = { kind: 'free' };
    card.legs.forEach((leg, li) => {
      const cellIdx = cellIndexes[li];
      grid[cellIdx] = { kind: 'leg', leg, label: legDisplayFor(leg, card.displayLabels, li) };
    });

    return grid.map(g => {
      if (g.kind === 'free') return '<div class="bingo-cell free">FIGHT</div>';
      if (g.kind === 'leg') {
        const s = legStatus.get(g.leg);
        const cls = s ? ' ' + s : '';
        const mark = s === 'won' ? 'X' : s === 'lost' ? 'X' : '';
        return '<div class="bingo-cell leg' + cls + '" data-leg="' + escapeAttr(g.leg) + '">' +
               '<span class="label">' + escapeHtml(g.label) + '</span>' +
               '<span class="mark">' + mark + '</span></div>';
      }
      const syms = ['*', '~', '.', '+', 'o', '#'];
      return '<div class="bingo-cell">' + syms[Math.floor(Math.random() * syms.length)] + '</div>';
    }).join('');
  }

  function pickCellIndexes(n) {
    // Deterministic spread across the 5x5 excluding center (12).
    const preferred = [6, 8, 16, 18, 2, 10, 14, 22, 0, 4, 20, 24];
    return preferred.slice(0, n);
  }

  function escapeHtml(s) { return String(s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }
  function escapeAttr(s) { return escapeHtml(s); }

  function renderCard(card) {
    const cls = themeClass(card.theme);
    const legStatus = new Map();
    card.legs.forEach(l => {
      const s = state.legStatus.get(l);
      if (s) legStatus.set(l, s);
    });

    const potential = (card.suggestedStake * card.odds).toFixed(2);
    const oddsStr = Number(card.odds).toFixed(2);

    const html = '' +
      '<div class="card ' + cls + '" id="card-' + card.id + '" data-id="' + card.id + '">' +
        '<div class="card-top">' +
          '<span class="theme">' + escapeHtml(card.themeEmoji || '[*]') + ' ' + escapeHtml(card.theme) + '</span>' +
          '<span class="odds">' + oddsStr + '<small>x</small></span>' +
        '</div>' +
        '<div class="bingo-grid">' + renderGrid(card, legStatus) + '</div>' +
        '<div class="stake-row" data-card-id="' + card.id + '">' +
          [1, 5, 25].map(s => '<button class="stake-chip' + (s === Number(card.suggestedStake) ? ' active' : '') + '" data-stake="' + s + '">$' + s + '</button>').join('') +
          '<input class="stake-input" type="number" min="1" step="1" value="' + Number(card.suggestedStake).toFixed(0) + '" />' +
        '</div>' +
        '<button class="tap-cta" data-card-id="' + card.id + '">TAP TO BET - win $' + potential + '</button>' +
        '<div class="payout-hint">Hits all ' + card.legs.length + ' legs - <strong>$' + potential + ' payout</strong></div>' +
      '</div>';

    return html;
  }

  function renderAll() {
    const cards = Array.from(state.cards.values());
    if (cards.length === 0) {
      emptyEl.style.display = 'block';
      cardsEl.innerHTML = '';
      return;
    }
    emptyEl.style.display = 'none';
    cardsEl.innerHTML = cards.map(renderCard).join('');

    cardsEl.querySelectorAll('.tap-cta').forEach(btn => {
      btn.addEventListener('click', () => placeBet(btn.dataset.cardId));
    });
    cardsEl.querySelectorAll('.stake-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const row = chip.parentElement;
        row.querySelectorAll('.stake-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        row.querySelector('.stake-input').value = chip.dataset.stake;
        updateCtaText(row.dataset.cardId);
      });
    });
    cardsEl.querySelectorAll('.stake-input').forEach(inp => {
      inp.addEventListener('input', () => {
        const row = inp.parentElement;
        row.querySelectorAll('.stake-chip').forEach(c => c.classList.remove('active'));
        updateCtaText(row.dataset.cardId);
      });
    });
  }

  function readStake(cardId) {
    const card = document.getElementById('card-' + cardId);
    if (!card) return 0;
    const val = Number(card.querySelector('.stake-input').value);
    return val > 0 ? val : 0;
  }

  function updateCtaText(cardId) {
    const card = state.cards.get(cardId);
    const cardEl = document.getElementById('card-' + cardId);
    if (!card || !cardEl) return;
    const stake = readStake(cardId);
    const potential = (stake * card.odds).toFixed(2);
    const cta = cardEl.querySelector('.tap-cta');
    if (cta && !cta.classList.contains('live')) {
      cta.textContent = 'TAP TO BET - win $' + potential;
      cardEl.querySelector('.payout-hint').innerHTML = 'Hits all ' + card.legs.length + ' legs - <strong>$' + potential + ' payout</strong>';
    }
  }

  async function loadCards(count) {
    emptyEl.style.display = 'block';
    try {
      const res = await fetch(API + '/api/v1/bingo/cards?fightId=' + encodeURIComponent(fightId) + '&count=' + (count || 4));
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      state.cards.clear();
      for (const c of data.cards) state.cards.set(c.id, c);
      renderAll();
    } catch (err) {
      console.error('Load cards failed', err);
      emptyEl.textContent = 'No active snapshot yet. Start the simulator to deal cards.';
    }
  }

  async function placeBet(cardId) {
    const card = state.cards.get(cardId);
    if (!card) return;
    const stake = readStake(cardId);
    if (!stake) return;

    const cta = document.querySelector('#card-' + cardId + ' .tap-cta');
    if (cta) { cta.disabled = true; cta.textContent = 'PLACING...'; }

    try {
      const res = await fetch(API + '/api/v1/bingo/bet', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, cardId, stake })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || err.title || 'Bet rejected');
      }
      const body = await res.json();
      state.activeTickets.set(body.ticketId, { cardId, potentialPayout: body.potentialPayout });

      if (cta) {
        cta.classList.add('live');
        cta.textContent = 'LIVE - ' + body.legs.length + ' LEGS OPEN';
        cta.disabled = true;
      }
      toast('Bet placed! $' + stake + ' -> $' + Number(body.potentialPayout).toFixed(2));

      window.parent && window.parent.postMessage({
        type: 'BINGO_BET_PLACED',
        ticketId: body.ticketId, cardId, fightId, userId,
        stake, odds: body.odds, potentialPayout: body.potentialPayout
      }, '*');
    } catch (err) {
      toast('Error: ' + err.message);
      if (cta) { cta.disabled = false; cta.textContent = 'TAP TO BET'; }
    }
  }

  function applyLegResolved(leg, outcome) {
    if (!leg || !outcome) return;
    state.legStatus.set(leg, outcome);

    // Update visible cells for this leg without re-rendering everything.
    document.querySelectorAll('.bingo-cell[data-leg="' + cssEscape(leg) + '"]').forEach(cell => {
      cell.classList.remove('won', 'lost', 'void');
      cell.classList.add(outcome);
      const mark = cell.querySelector('.mark');
      if (mark) mark.textContent = outcome === 'won' ? 'X' : outcome === 'lost' ? 'X' : '-';

      const cardEl = cell.closest('.card');
      if (!cardEl) return;
      const cardId = cardEl.dataset.id;
      const card = state.cards.get(cardId);
      if (!card) return;

      const hits = card.legs.filter(l => state.legStatus.get(l) === 'won').length;
      const losses = card.legs.filter(l => state.legStatus.get(l) === 'lost').length;

      if (losses === 0 && hits >= card.legs.length - 1 && hits < card.legs.length) {
        cardEl.classList.add('near-miss');
        setTimeout(() => cardEl.classList.remove('near-miss'), 2500);
      }
      if (hits === card.legs.length && losses === 0) {
        cardEl.classList.add('winning');
        launchConfetti(cardEl);
      }
    });
  }

  function cssEscape(s) { return String(s).replace(/([^\w-])/g, '\\$1'); }

  function toast(msg) {
    const el = document.createElement('div');
    el.className = 'toast'; el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2200);
  }

  // Confetti: tiny canvas burst for wins.
  const confettiCanvas = document.getElementById('confetti-layer');
  const cctx = confettiCanvas.getContext('2d');
  function sizeCanvas() {
    confettiCanvas.width = window.innerWidth;
    confettiCanvas.height = window.innerHeight;
  }
  window.addEventListener('resize', sizeCanvas);
  sizeCanvas();

  const particles = [];
  function launchConfetti(cardEl) {
    const rect = cardEl.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const colors = ['#00dc82', '#58a6ff', '#f0c000', '#ff79c6', '#bd93f9'];
    for (let i = 0; i < 80; i++) {
      particles.push({
        x: cx, y: cy,
        vx: (Math.random() - 0.5) * 10,
        vy: (Math.random() - 1) * 10,
        g: 0.3,
        life: 80 + Math.random() * 40,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: 3 + Math.random() * 3
      });
    }
  }
  function tickConfetti() {
    cctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.vy += p.g; p.x += p.vx; p.y += p.vy; p.life--;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      cctx.fillStyle = p.color;
      cctx.fillRect(p.x, p.y, p.size, p.size);
    }
    requestAnimationFrame(tickConfetti);
  }
  tickConfetti();

  refreshBtn.addEventListener('click', () => loadCards(4));

  // SignalR
  const connection = new signalR.HubConnectionBuilder()
    .withUrl(API + '/hubs/fight')
    .withAutomaticReconnect()
    .build();

  connection.on('legResolved', (msg) => {
    const outcome = (msg.outcome || '').toLowerCase();
    applyLegResolved(msg.leg, outcome);
  });
  connection.on('ticketSettled', (msg) => {
    if (!state.activeTickets.has(msg.ticketId)) return;
    if ((msg.result || '').toLowerCase() === 'won') {
      state.streak++;
      streakEl.textContent = state.streak;
      toast('CARD WON! +$' + Number(msg.payout).toFixed(2));
    } else if ((msg.result || '').toLowerCase() === 'lost') {
      state.streak = 0;
      streakEl.textContent = '0';
    }
    state.activeTickets.delete(msg.ticketId);
    window.parent && window.parent.postMessage({
      type: 'BINGO_CARD_SETTLED',
      ticketId: msg.ticketId, result: msg.result, payout: msg.payout
    }, '*');
  });
  connection.on('fightResulted', () => {
    // Deal a fresh hand when the fight wraps, so cards are always fresh for the next fight.
    setTimeout(() => loadCards(4), 1500);
  });
  connection.onreconnecting(() => setConn('down'));
  connection.onreconnected(() => {
    setConn('live');
    connection.invoke('JoinFight', fightId).catch(() => {});
    connection.invoke('JoinUser', userId).catch(() => {});
  });
  connection.onclose(() => setConn('down'));

  connection.start()
    .then(() => {
      setConn('live');
      return Promise.all([
        connection.invoke('JoinFight', fightId),
        connection.invoke('JoinUser', userId)
      ]);
    })
    .catch(err => { console.error('SignalR connect failed', err); setConn('down'); });

  loadCards(4);
})();
</script>
</body>
</html>
