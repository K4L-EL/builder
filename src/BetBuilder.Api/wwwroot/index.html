<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bet Builder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-2: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #00dc82;
    --accent-dim: rgba(0,220,130,0.12);
    --red: #f85149;
    --red-dim: rgba(248,81,73,0.12);
    --yellow: #f0c000;
    --yellow-dim: rgba(240,192,0,0.12);
    --blue: #58a6ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 16px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    margin-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .snapshot-badge {
    font-size: 11px;
    color: var(--text-dim);
    background: var(--surface-2);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }
  .snapshot-badge .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* WALLET BAR */
  .wallet-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    margin-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .wallet-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .wallet-balance {
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
  }
  .wallet-held {
    font-size: 10px;
    color: var(--text-dim);
  }
  .deposit-btn {
    font-size: 11px;
    font-weight: 600;
    font-family: inherit;
    padding: 5px 12px;
    border-radius: 14px;
    border: 1px solid var(--accent);
    background: var(--accent-dim);
    color: var(--accent);
    cursor: pointer;
  }
  .deposit-btn:hover { background: rgba(0,220,130,0.2); }

  /* DEPOSIT MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    width: 90%;
    max-width: 320px;
  }
  .modal h3 {
    font-size: 15px;
    margin-bottom: 12px;
    color: var(--text);
  }
  .modal input {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    outline: none;
    margin-bottom: 12px;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-actions {
    display: flex;
    gap: 8px;
  }
  .modal-actions button {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    font-family: inherit;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    border: none;
  }
  .modal-cancel {
    background: var(--surface-2);
    color: var(--text-dim);
    border: 1px solid var(--border) !important;
  }
  .modal-confirm {
    background: linear-gradient(135deg, var(--accent), #00b86b);
    color: var(--bg);
  }

  .loading {
    display: flex; align-items: center; justify-content: center;
    flex: 1; color: var(--text-dim); font-size: 14px; gap: 10px;
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-state {
    flex: 1; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px; color: var(--red);
    font-size: 14px; text-align: center; padding: 24px;
  }
  .error-state button {
    background: var(--red-dim); color: var(--red); border: 1px solid var(--red);
    padding: 8px 20px; border-radius: 6px; cursor: pointer;
    font-family: inherit; font-weight: 600;
  }

  .markets { flex: 1; overflow-y: auto; padding-bottom: 280px; }

  .market-group { margin-bottom: 6px; }
  .market-group-header {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text-dim);
    padding: 10px 4px 6px; position: sticky; top: 0;
    background: var(--bg); z-index: 2;
  }

  .legs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .legs-grid.single { grid-template-columns: 1fr; }

  .leg-btn {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 10px 6px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; cursor: pointer; transition: all 0.15s ease;
    min-height: 54px; user-select: none;
  }
  .leg-btn:hover:not(.unavailable) { background: var(--surface-2); border-color: var(--text-dim); }
  .leg-btn.selected { background: var(--accent-dim); border-color: var(--accent); }
  .leg-btn.unavailable { opacity: 0.3; cursor: not-allowed; }
  .leg-label { font-size: 11px; color: var(--text-dim); font-weight: 500; text-align: center; line-height: 1.3; }
  .leg-btn.selected .leg-label { color: var(--text); }
  .leg-odds { font-family: 'Space Mono', monospace; font-size: 15px; font-weight: 700; margin-top: 2px; color: var(--text); }
  .leg-btn.selected .leg-odds { color: var(--accent); }

  /* BET SLIP */
  .betslip {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px; background: var(--surface);
    border-top: 1px solid var(--border); padding: 12px 16px;
    z-index: 10; transition: transform 0.3s ease;
  }
  .betslip.hidden { transform: translate(-50%, 100%); }

  .slip-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .slip-title { font-size: 13px; font-weight: 600; color: var(--text-dim); }
  .slip-count {
    background: var(--accent); color: var(--bg); font-size: 11px; font-weight: 700;
    width: 20px; height: 20px; border-radius: 50%; display: inline-flex;
    align-items: center; justify-content: center; margin-left: 6px;
  }
  .clear-btn {
    font-size: 11px; color: var(--text-dim); background: none;
    border: none; cursor: pointer; font-family: inherit; text-decoration: underline;
  }

  .slip-selections { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; max-height: 60px; overflow-y: auto; }
  .slip-tag {
    font-size: 10px; background: var(--surface-2); border: 1px solid var(--border);
    padding: 3px 8px; border-radius: 12px; color: var(--text-dim);
    display: flex; align-items: center; gap: 4px;
  }
  .slip-tag .remove { cursor: pointer; color: var(--red); font-weight: 700; font-size: 12px; }

  .warning-item { font-size: 10px; color: var(--yellow); background: var(--yellow-dim); padding: 4px 8px; border-radius: 4px; margin-bottom: 3px; }
  .error-item { font-size: 10px; color: var(--red); background: var(--red-dim); padding: 4px 8px; border-radius: 4px; margin-bottom: 3px; }

  .slip-pricing { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .combo-odds { font-family: 'Space Mono', monospace; font-size: 28px; font-weight: 700; color: var(--accent); min-width: 80px; }
  .combo-odds.invalid { color: var(--red); font-size: 16px; }
  .combo-odds.loading-price { color: var(--text-dim); }

  .stake-input-wrap { flex: 1; position: relative; }
  .stake-input-wrap .currency {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--text-dim); font-size: 14px; font-weight: 600;
  }
  .stake-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 12px 10px 28px; color: var(--text);
    font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700; outline: none;
  }
  .stake-input:focus { border-color: var(--accent); }

  .payout-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: var(--text-dim); margin-bottom: 10px;
  }
  .payout-value { font-family: 'Space Mono', monospace; font-weight: 700; color: var(--accent); font-size: 14px; }

  .place-btn {
    width: 100%; padding: 14px; border: none; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), #00b86b);
    color: var(--bg); font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 700; cursor: pointer;
    letter-spacing: 0.3px; transition: opacity 0.15s;
  }
  .place-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .place-btn:hover:not(:disabled) { opacity: 0.9; }

  .prob-detail { font-size: 10px; color: var(--text-dim); text-align: center; margin-top: 6px; }

  /* TICKET HISTORY */
  .ticket-history {
    margin-top: 10px;
    border-top: 1px solid var(--border);
    padding-top: 8px;
  }
  .ticket-history-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .ticket-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 8px;
    background: var(--surface-2);
    border-radius: 4px;
    margin-bottom: 3px;
    font-size: 11px;
  }
  .ticket-legs {
    color: var(--text-dim);
    max-width: 180px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ticket-odds {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 12px;
  }
  .ticket-status {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 8px;
    text-transform: uppercase;
  }
  .ticket-status.placed { background: var(--yellow-dim); color: var(--yellow); }
  .ticket-status.won { background: var(--accent-dim); color: var(--accent); }
  .ticket-status.lost { background: var(--red-dim); color: var(--red); }
  .ticket-status.void { background: var(--surface); color: var(--text-dim); border: 1px solid var(--border); }

  /* SIMULATION BAR */
  .sim-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    margin-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .sim-play-btn {
    font-size: 11px;
    font-weight: 700;
    font-family: inherit;
    padding: 5px 14px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }
  .sim-play-btn.play {
    background: linear-gradient(135deg, var(--accent), #00b86b);
    color: var(--bg);
  }
  .sim-play-btn.stop {
    background: var(--red);
    color: #fff;
  }
  .sim-play-btn:hover { opacity: 0.85; }

  .sim-speed {
    display: flex;
    gap: 2px;
  }
  .sim-speed button {
    font-size: 10px;
    font-weight: 600;
    font-family: inherit;
    padding: 3px 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .sim-speed button.active {
    border-color: var(--accent);
    background: var(--accent-dim);
    color: var(--accent);
  }
  .sim-speed button:hover { border-color: var(--text-dim); }

  .sim-progress {
    flex: 1;
    text-align: right;
    font-size: 10px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
  }
  .sim-progress .sim-idx {
    color: var(--text);
    font-weight: 700;
  }

  .live-badge {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--red);
    color: #fff;
    animation: livePulse 1.5s infinite;
  }
  @keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .sim-progress-bar {
    width: 100%;
    height: 3px;
    background: var(--surface-2);
    border-radius: 2px;
    margin-bottom: 4px;
    overflow: hidden;
  }
  .sim-progress-bar .fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--blue));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .sim-fight-over {
    text-align: center;
    padding: 6px;
    font-size: 12px;
    font-weight: 700;
    color: var(--yellow);
    background: var(--yellow-dim);
    border-radius: 6px;
    margin-bottom: 4px;
    display: none;
  }

  /* ODDS FLASH ANIMATIONS */
  @keyframes flashGreen {
    0% { background: var(--accent-dim); }
    100% { background: var(--surface); }
  }
  @keyframes flashRed {
    0% { background: var(--red-dim); }
    100% { background: var(--surface); }
  }
  .leg-btn.odds-up { animation: flashGreen 0.8s ease-out; }
  .leg-btn.odds-down { animation: flashRed 0.8s ease-out; }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <h1>BET BUILDER</h1>
    <div class="snapshot-badge" id="snapshotBadge">
      <span class="dot"></span>connecting...
    </div>
  </div>

  <div class="wallet-bar" id="walletBar" style="display:none">
    <div class="wallet-info">
      <div class="wallet-balance" id="walletBalance">$0.00</div>
      <div class="wallet-held" id="walletHeld"></div>
    </div>
    <button class="deposit-btn" onclick="showDeposit()">+ Deposit</button>
  </div>

  <div class="sim-bar" id="simBar">
    <button class="sim-play-btn play" id="simPlayBtn" onclick="toggleSimulation()">PLAY FIGHT</button>
    <div class="sim-speed" id="simSpeedGroup">
      <button onclick="setSimSpeed(1)" data-speed="1" class="active">1x</button>
      <button onclick="setSimSpeed(2)" data-speed="2">2x</button>
      <button onclick="setSimSpeed(5)" data-speed="5">5x</button>
      <button onclick="setSimSpeed(10)" data-speed="10">10x</button>
    </div>
    <div class="sim-progress" id="simProgress"></div>
    <span class="live-badge" id="liveBadge" style="display:none">LIVE</span>
  </div>
  <div class="sim-progress-bar" id="simProgressBar" style="display:none">
    <div class="fill" id="simProgressFill" style="width:0%"></div>
  </div>
  <div class="sim-fight-over" id="simFightOver">FIGHT OVER</div>

  <div class="modal-overlay" id="depositModal">
    <div class="modal">
      <h3>Deposit Funds</h3>
      <input type="number" id="depositAmount" placeholder="100.00" min="1" step="1" value="100">
      <div class="modal-actions">
        <button class="modal-cancel" onclick="hideDeposit()">Cancel</button>
        <button class="modal-confirm" onclick="doDeposit()">Deposit</button>
      </div>
    </div>
  </div>

  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    Loading markets...
  </div>

  <div class="error-state" id="errorState" style="display:none">
    <div id="errorMsg">Failed to load markets</div>
    <button onclick="init()">Retry</button>
  </div>

  <div class="markets" id="markets" style="display:none"></div>

  <div class="betslip hidden" id="betslip">
    <div class="slip-header">
      <div>
        <span class="slip-title">Bet Builder</span>
        <span class="slip-count" id="slipCount">0</span>
      </div>
      <button class="clear-btn" onclick="clearAll()">Clear all</button>
    </div>
    <div class="slip-selections" id="slipSelections"></div>
    <div id="slipMessages"></div>
    <div class="slip-pricing">
      <div class="combo-odds" id="comboOdds">--</div>
      <div class="stake-input-wrap">
        <span class="currency">$</span>
        <input type="number" class="stake-input" id="stakeInput" placeholder="0.00" min="0" step="1" value="10" oninput="updatePayout()">
      </div>
    </div>
    <div class="payout-row">
      <span>Potential payout</span>
      <span class="payout-value" id="payoutValue">$0.00</span>
    </div>
    <button class="place-btn" id="placeBtn" disabled onclick="placeBet()">Select markets</button>
    <div class="prob-detail" id="probDetail"></div>
    <div class="ticket-history" id="ticketHistory" style="display:none">
      <div class="ticket-history-title">Recent Bets</div>
      <div id="ticketList"></div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
const params = new URLSearchParams(window.location.search);
const userId = params.get('userId') || 'demo_user';

let legsData = [];
let selected = new Set();
let currentPricing = null;
let priceTimeout = null;
let walletData = null;

// --- Simulation state ---
let simPlaying = false;
let simSpeed = 1;
let simPollTimer = null;
let previousOddsMap = {};

function formatLegName(raw) {
  let s = raw.replace(/^bb_/, '');
  const side = s.startsWith('red_') ? 'R' : s.startsWith('blue_') ? 'B' : '';
  s = s.replace(/^(red|blue)_/, '');
  s = s.replace(/_/g, ' ');
  s = s.replace(/over (\d+) (\d+)/g, 'O $1.$2');
  s = s.replace(/\b\w/g, c => c.toUpperCase());
  if (side) s = (side === 'R' ? '🔴 ' : '🔵 ') + s;
  return s;
}

function categorizeLeg(name) {
  if (/_(win|draw|win_or_draw)$/.test(name)) return 'Result';
  if (/_ko$|_decision$/.test(name)) return 'Method';
  if (/_knockdowns_/.test(name)) return 'Knockdowns';
  if (/_tsl_/.test(name)) return name.includes('red_') ? '🔴 Total Strikes Landed' : '🔵 Total Strikes Landed';
  if (/_phsl_/.test(name)) return name.includes('red_') ? '🔴 Power Head Strikes' : '🔵 Power Head Strikes';
  return 'Other';
}

async function loadWallet() {
  try {
    const res = await fetch(`${API}/api/v1/wallet/${encodeURIComponent(userId)}/balance`);
    if (!res.ok) return;
    walletData = await res.json();
    document.getElementById('walletBar').style.display = 'flex';
    document.getElementById('walletBalance').textContent = `$${walletData.available.toFixed(2)}`;
    document.getElementById('walletHeld').textContent = walletData.held > 0 ? `$${walletData.held.toFixed(2)} held` : '';
  } catch {}
}

function showDeposit() { document.getElementById('depositModal').classList.add('active'); }
function hideDeposit() { document.getElementById('depositModal').classList.remove('active'); }

async function doDeposit() {
  const amount = parseFloat(document.getElementById('depositAmount').value) || 0;
  if (amount <= 0) return;
  try {
    const res = await fetch(`${API}/api/v1/wallet/deposit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId, amount })
    });
    if (res.ok) {
      hideDeposit();
      await loadWallet();
    }
  } catch {}
}

async function init() {
  document.getElementById('loadingState').style.display = 'flex';
  document.getElementById('errorState').style.display = 'none';
  document.getElementById('markets').style.display = 'none';

  try {
    const [legsRes] = await Promise.all([
      fetch(`${API}/api/v1/snapshots/active/legs`),
      loadWallet()
    ]);
    if (!legsRes.ok) throw new Error(`HTTP ${legsRes.status}`);
    const data = await legsRes.json();

    legsData = data.legs;
    document.getElementById('snapshotBadge').innerHTML =
      `<span class="dot"></span>${data.snapshotId} &middot; ${data.scenarioCount} sims`;

    renderMarkets();
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('markets').style.display = 'block';
    await loadTickets();
  } catch (err) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorMsg').textContent = err.message;
    document.getElementById('errorState').style.display = 'flex';
  }
}

function renderMarkets() {
  const groups = {};
  legsData.forEach(leg => {
    const cat = categorizeLeg(leg.name);
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(leg);
  });

  const order = ['Result', 'Method', 'Knockdowns',
    '🔴 Total Strikes Landed', '🔵 Total Strikes Landed',
    '🔴 Power Head Strikes', '🔵 Power Head Strikes', 'Other'];

  const container = document.getElementById('markets');
  container.innerHTML = '';

  order.forEach(cat => {
    const legs = groups[cat];
    if (!legs) return;
    const div = document.createElement('div');
    div.className = 'market-group';
    const isSingle = legs.length <= 2 && cat === 'Knockdowns' ? false : legs.length === 1;
    div.innerHTML = `
      <div class="market-group-header">${cat}</div>
      <div class="legs-grid${isSingle ? ' single' : ''}">
        ${legs.map(leg => `
          <div class="leg-btn ${!leg.available ? 'unavailable' : ''} ${selected.has(leg.name) ? 'selected' : ''}"
               data-leg="${leg.name}"
               onclick="toggleLeg('${leg.name}', ${leg.available})">
            <div class="leg-label">${formatLegName(leg.name)}</div>
            <div class="leg-odds">${leg.available && leg.pricedOdds ? leg.pricedOdds.toFixed(2) : '—'}</div>
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(div);
  });
}

function toggleLeg(name, available) {
  if (!available) return;
  if (selected.has(name)) selected.delete(name);
  else selected.add(name);
  document.querySelectorAll('.leg-btn').forEach(btn => {
    btn.classList.toggle('selected', selected.has(btn.dataset.leg));
  });
  updateSlip();
  debouncedPrice();
}

function clearAll() {
  selected.clear();
  document.querySelectorAll('.leg-btn').forEach(btn => btn.classList.remove('selected'));
  updateSlip();
  currentPricing = null;
  document.getElementById('comboOdds').textContent = '--';
  document.getElementById('comboOdds').className = 'combo-odds';
  document.getElementById('probDetail').textContent = '';
  updatePayout();
}

function updateSlip() {
  const slip = document.getElementById('betslip');
  const count = selected.size;
  if (count === 0) { slip.classList.add('hidden'); return; }
  slip.classList.remove('hidden');
  document.getElementById('slipCount').textContent = count;
  const sel = document.getElementById('slipSelections');
  sel.innerHTML = [...selected].map(name => `
    <span class="slip-tag">
      ${formatLegName(name)}
      <span class="remove" onclick="event.stopPropagation();toggleLeg('${name}', true)">&times;</span>
    </span>
  `).join('');
  updatePlaceButton();
}

function updatePlaceButton() {
  const count = selected.size;
  const btn = document.getElementById('placeBtn');
  if (count < 2) {
    btn.disabled = true;
    btn.textContent = 'Select at least 2 markets';
    return;
  }
  if (!currentPricing?.valid) {
    btn.disabled = true;
    btn.textContent = 'Invalid combo';
    return;
  }
  const stake = parseFloat(document.getElementById('stakeInput').value) || 0;
  if (walletData && stake > walletData.available) {
    btn.disabled = true;
    btn.textContent = 'Insufficient balance';
    return;
  }
  btn.disabled = false;
  btn.textContent = `Place Bet · $${stake.toFixed(2)}`;
}

function debouncedPrice() {
  clearTimeout(priceTimeout);
  if (selected.size < 2) {
    currentPricing = null;
    document.getElementById('comboOdds').textContent = '--';
    document.getElementById('comboOdds').className = 'combo-odds';
    document.getElementById('slipMessages').innerHTML = '';
    document.getElementById('probDetail').textContent = '';
    updatePayout();
    return;
  }
  document.getElementById('comboOdds').textContent = '...';
  document.getElementById('comboOdds').className = 'combo-odds loading-price';
  priceTimeout = setTimeout(fetchPrice, 200);
}

async function fetchPrice() {
  const legs = [...selected];
  try {
    const res = await fetch(`${API}/api/v1/pricing/combo`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ legs })
    });
    const data = await res.json();
    currentPricing = data;

    const msgs = document.getElementById('slipMessages');
    msgs.innerHTML = '';
    if (data.warnings?.length) {
      msgs.innerHTML += data.warnings.map(w => `<div class="warning-item">${w.message}</div>`).join('');
    }
    if (!data.valid) {
      msgs.innerHTML += data.errors.map(e => `<div class="error-item">${e.message}</div>`).join('');
      document.getElementById('comboOdds').textContent = 'N/A';
      document.getElementById('comboOdds').className = 'combo-odds invalid';
      document.getElementById('probDetail').textContent = '';
      updatePayout();
      updatePlaceButton();
      return;
    }

    const odds = data.pricedDecimalOdds;
    document.getElementById('comboOdds').textContent = odds.toFixed(2);
    document.getElementById('comboOdds').className = 'combo-odds';
    document.getElementById('probDetail').textContent =
      `${data.matchingScenarios}/${data.totalScenarios} sims matched · ${(data.jointProbability * 100).toFixed(1)}% implied`;
    updatePayout();
    updatePlaceButton();
  } catch (err) {
    document.getElementById('comboOdds').textContent = 'ERR';
    document.getElementById('comboOdds').className = 'combo-odds invalid';
  }
}

function updatePayout() {
  const stake = parseFloat(document.getElementById('stakeInput').value) || 0;
  const odds = currentPricing?.pricedDecimalOdds || 0;
  const payout = (stake * odds).toFixed(2);
  document.getElementById('payoutValue').textContent = currentPricing?.valid ? `$${payout}` : '$0.00';
  updatePlaceButton();
}

async function placeBet() {
  if (!currentPricing?.valid) return;
  const stake = parseFloat(document.getElementById('stakeInput').value) || 0;
  if (stake <= 0) return;

  const btn = document.getElementById('placeBtn');
  btn.disabled = true;
  btn.textContent = 'Placing...';

  try {
    const res = await fetch(`${API}/api/v1/tickets/place`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId, legs: [...selected], stake })
    });
    const data = await res.json();

    if (!res.ok) {
      const detail = data.detail || data.title || 'Bet rejected';
      btn.textContent = detail;
      btn.disabled = true;
      setTimeout(() => updatePlaceButton(), 3000);
      return;
    }

    window.parent.postMessage({
      type: 'BETBUILDER_BET_PLACED',
      ticketId: data.ticketId,
      legs: data.legs,
      odds: data.odds,
      stake: data.stake,
      potentialPayout: data.potentialPayout,
      userId: data.userId
    }, '*');

    btn.textContent = 'Bet Placed!';
    await loadWallet();
    await loadTickets();
    setTimeout(() => updatePlaceButton(), 2000);
  } catch (err) {
    btn.textContent = 'Error placing bet';
    setTimeout(() => updatePlaceButton(), 3000);
  }
}

async function loadTickets() {
  try {
    const res = await fetch(`${API}/api/v1/tickets/${encodeURIComponent(userId)}?limit=5`);
    if (!res.ok) return;
    const tickets = await res.json();
    const container = document.getElementById('ticketHistory');
    const list = document.getElementById('ticketList');

    if (tickets.length === 0) { container.style.display = 'none'; return; }
    container.style.display = 'block';

    list.innerHTML = tickets.map(t => `
      <div class="ticket-item">
        <div class="ticket-legs">${t.legs.map(l => formatLegName(l)).join(', ')}</div>
        <div class="ticket-odds">${t.odds.toFixed(2)}</div>
        <div>$${t.stake.toFixed(2)}</div>
        <div class="ticket-status ${t.status}">${t.status}</div>
      </div>
    `).join('');
  } catch {}
}

// --- Simulation controls ---
function setSimSpeed(speed) {
  simSpeed = speed;
  document.querySelectorAll('#simSpeedGroup button').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.speed) === speed);
  });
  if (simPlaying) {
    fetch(`${API}/api/v1/simulation/start`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ speed })
    });
  }
}

async function toggleSimulation() {
  if (simPlaying) {
    await fetch(`${API}/api/v1/simulation/stop`, { method: 'POST' });
    stopSimPolling();
  } else {
    document.getElementById('simFightOver').style.display = 'none';
    const res = await fetch(`${API}/api/v1/simulation/start`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ speed: simSpeed })
    });
    if (!res.ok) {
      const err = await res.json();
      alert(err.error || 'Failed to start simulation');
      return;
    }
    simPlaying = true;
    updateSimUI();
    startSimPolling();
  }
}

function updateSimUI() {
  const btn = document.getElementById('simPlayBtn');
  const badge = document.getElementById('liveBadge');
  const bar = document.getElementById('simProgressBar');
  if (simPlaying) {
    btn.textContent = 'STOP';
    btn.className = 'sim-play-btn stop';
    badge.style.display = 'inline';
    bar.style.display = 'block';
  } else {
    btn.textContent = 'PLAY FIGHT';
    btn.className = 'sim-play-btn play';
    badge.style.display = 'none';
    bar.style.display = 'none';
  }
}

function startSimPolling() {
  if (simPollTimer) return;
  simPollTimer = setInterval(pollSimulation, 2000);
  pollSimulation();
}

function stopSimPolling() {
  simPlaying = false;
  updateSimUI();
  if (simPollTimer) {
    clearInterval(simPollTimer);
    simPollTimer = null;
  }
}

function formatFightTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

async function pollSimulation() {
  try {
    const [statusRes, legsRes] = await Promise.all([
      fetch(`${API}/api/v1/simulation/status`),
      fetch(`${API}/api/v1/snapshots/active/legs`)
    ]);

    if (statusRes.ok) {
      const st = await statusRes.json();
      const pct = st.totalFiles > 0 ? (st.currentIndex / st.totalFiles * 100) : 0;
      document.getElementById('simProgress').innerHTML =
        `<span class="sim-idx">${st.currentIndex}</span>/${st.totalFiles} &middot; ${formatFightTime(st.elapsedFightSeconds)}`;
      document.getElementById('simProgressFill').style.width = `${pct}%`;

      if (!st.isPlaying && simPlaying) {
        stopSimPolling();
        if (st.currentIndex >= st.totalFiles - 1) {
          document.getElementById('simFightOver').style.display = 'block';
        }
      }
    }

    if (legsRes.ok) {
      const data = await legsRes.json();
      updateLegsWithAnimation(data.legs);
      document.getElementById('snapshotBadge').innerHTML =
        `<span class="dot"></span>${data.snapshotId} &middot; ${data.scenarioCount} sims`;

      if (selected.size >= 2) {
        debouncedPrice();
      }
    }
  } catch {}
}

function updateLegsWithAnimation(newLegs) {
  const newOddsMap = {};
  newLegs.forEach(l => { if (l.pricedOdds) newOddsMap[l.name] = l.pricedOdds; });

  newLegs.forEach(leg => {
    const btn = document.querySelector(`.leg-btn[data-leg="${leg.name}"]`);
    if (!btn) return;

    const oldOdds = previousOddsMap[leg.name];
    const newOdds = leg.pricedOdds;

    const oddsEl = btn.querySelector('.leg-odds');
    if (oddsEl) {
      oddsEl.textContent = leg.available && newOdds ? newOdds.toFixed(2) : '—';
    }

    if (leg.available !== undefined) {
      btn.classList.toggle('unavailable', !leg.available);
    }

    if (oldOdds && newOdds && oldOdds !== newOdds) {
      btn.classList.remove('odds-up', 'odds-down');
      void btn.offsetWidth;
      btn.classList.add(newOdds < oldOdds ? 'odds-up' : 'odds-down');
    }
  });

  legsData = newLegs;
  previousOddsMap = newOddsMap;
}

async function checkSimStatus() {
  try {
    const res = await fetch(`${API}/api/v1/simulation/status`);
    if (res.ok) {
      const st = await res.json();
      if (st.isPlaying) {
        simPlaying = true;
        simSpeed = st.speed;
        setSimSpeed(st.speed);
        updateSimUI();
        startSimPolling();
      }
    }
  } catch {}
}

init();
checkSimStatus();
</script>
</body>
</html>
